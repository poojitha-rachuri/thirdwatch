name: thirdwatch

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thirdwatch
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: thirdwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thirdwatch"]
      interval: 5s
      timeout: 5s
      retries: 5
    secrets:
      - db_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://thirdwatch:${DB_PASSWORD:-thirdwatch}@postgres:5432/thirdwatch
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL:-http://localhost:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_TEAM_PRICE_ID: ${STRIPE_TEAM_PRICE_ID:-}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - db_password

  worker:
    build:
      context: ..
      dockerfile: docker/watcher.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://thirdwatch:${DB_PASSWORD:-thirdwatch}@postgres:5432/thirdwatch
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CHECK_INTERVAL_HOURS: ${CHECK_INTERVAL_HOURS:-6}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - db_password

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: production
    depends_on:
      - api

secrets:
  db_password:
    file: ./secrets/db_password

volumes:
  postgres_data:
  redis_data:
