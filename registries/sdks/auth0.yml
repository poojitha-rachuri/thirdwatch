provider: auth0
display_name: "Auth0"
homepage: "https://auth0.com"

patterns:
  npm:
    - package: "auth0"
      import_patterns:
        - "auth0"
        - "Auth0"
  pypi:
    - package: "auth0-python"
      import_patterns:
        - "import auth0"
        - "from auth0"

known_api_base_urls:
  - "https://*.auth0.com"

env_var_patterns:
  - "AUTH0_DOMAIN"
  - "AUTH0_CLIENT_ID"
  - "AUTH0_CLIENT_SECRET"
